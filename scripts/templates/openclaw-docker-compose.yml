services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      TRELLO_API_KEY: ${TRELLO_API_KEY:-}
      TRELLO_TOKEN: ${TRELLO_TOKEN:-}
      SERVER_IP: ${SERVER_IP:-144.76.34.61}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - /root/.local/bin/obsidian-cli:/usr/local/bin/obsidian-cli:ro
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - /root/.claude:/home/node/.claude
      - /root/.claude.json:/home/node/.claude.json
      - /usr/lib/node_modules/@anthropic-ai/claude-code:/usr/local/lib/node_modules/@anthropic-ai/claude-code:ro
      - /root/projects:/home/node/projects
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "110"
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - 127.0.0.1:3001:3001
      - 127.0.0.1:5173:5173
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      TRELLO_API_KEY: ${TRELLO_API_KEY:-}
      TRELLO_TOKEN: ${TRELLO_TOKEN:-}
      SERVER_IP: ${SERVER_IP:-144.76.34.61}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - /root/.local/bin/obsidian-cli:/usr/local/bin/obsidian-cli:ro
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - /root/.claude:/home/node/.claude
      - /root/.claude.json:/home/node/.claude.json
      - /usr/lib/node_modules/@anthropic-ai/claude-code:/usr/local/lib/node_modules/@anthropic-ai/claude-code:ro
      - /root/projects:/home/node/projects
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/local/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
    group_add:
      - "110"
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
