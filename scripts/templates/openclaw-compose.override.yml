# OpenClaw compose override — generated by scripts/server-bootstrap.sh.
# Do not edit on the server; rerun bootstrap to update.
#
# What this adds on top of upstream /opt/openclaw/docker-compose.yml:
#   - bind-mount host `gh` binary into containers (sandboxed cli has no apt access)
#   - bind-mount the whole gh config DIR (not single file) so gh can write its
#     companion `config.yml` next to `hosts.yml`. env-based auth is filtered by
#     openclaw before reaching the spawned claude subprocess, so file-based is
#     the only working option.
#   - keep openclaw-cli on `unless-stopped` so it survives reboots
services:
  openclaw-gateway:
    volumes:
      - /usr/bin/gh:/usr/local/bin/gh:ro
      - /etc/openclaw/gh:/home/node/.config/gh
  openclaw-cli:
    restart: unless-stopped
    volumes:
      - /usr/bin/gh:/usr/local/bin/gh:ro
      - /etc/openclaw/gh:/home/node/.config/gh
