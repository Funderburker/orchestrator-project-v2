# OpenClaw compose override — generated by scripts/server-bootstrap.sh.
# Do not edit on the server; rerun bootstrap to update.
#
# What this adds on top of upstream /opt/openclaw/docker-compose.yml:
#   - bind-mount host `gh` binary + config dir (sandboxed cli has no apt access)
#   - bind-mount host docker CLI into gateway too (worker needs it for the
#     openclaw `docker` skill which has requires.bins=[docker])
#   - keep openclaw-cli on `unless-stopped` so it survives reboots
#   - prepend a small init that creates /usr/local/bin/claude symlink
#     (upstream image v5.6+ stopped creating it at build time)
services:
  openclaw-gateway:
    volumes:
      - /usr/bin/gh:/usr/local/bin/gh:ro
      - /etc/openclaw/gh:/home/node/.config/gh
      - /usr/bin/docker:/usr/local/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
  openclaw-cli:
    restart: unless-stopped
    volumes:
      - /usr/bin/gh:/usr/local/bin/gh:ro
      - /etc/openclaw/gh:/home/node/.config/gh
